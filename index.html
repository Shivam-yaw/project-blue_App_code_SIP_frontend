<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIP Calculator - BlueVault Finance</title>
<link rel="stylesheet" href="https://bluevaultfinance.s3.ap-south-1.amazonaws.com/pages/sip/style.css" />
</head>
<body>
  <header>
    <div class="navbar">
      <a href="http://www.bluevault.live">
        <img src="https://bluevaultfinance.s3.ap-south-1.amazonaws.com/Logo/fulllogo_transparent.png" alt="BlueVault Logo" class="logo" />
      </a>
      <nav>
        <ul>
          <li><a href="http://www.bluevault.live">Home</a></li>
          <li><a href="https://www.bluevault.live/sip-calc">SIP Calculator</a></li>
          <li><a href="https://www.bluevault.live/emi-calc">EMI Calculator</a></li>
          <li><a href="https://www.bluevault.live/loan-form">Loan Application</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main class="calculator-container">
    <h1>SIP Calculator</h1>
    <div class="form-group">
      <label>Monthly Investment (₹)</label>
      <input type="number" id="investment" value="5000">
      <input type="range" id="investment-slider" min="1000" max="100000" step="500" value="5000">
    </div>
    <div class="form-group">
      <label>Expected Annual Return (%)</label>
      <input type="number" id="rate" value="12">
      <input type="range" id="rate-slider" min="1" max="30" step="0.1" value="12">
    </div>
    <div class="form-group">
      <label>Investment Period (years)</label>
      <input type="number" id="years" value="10">
      <input type="range" id="years-slider" min="1" max="40" step="1" value="10">
    </div>
    <button id="calculate">Calculate SIP</button>
    <div class="results">
      <p><strong>Total Invested:</strong> ₹<span id="invested">0</span></p>
      <p><strong>Estimated Returns:</strong> ₹<span id="returns">0</span></p>
      <p><strong>Total Value:</strong> ₹<span id="total">0</span></p>
    </div>
    <canvas id="breakupChart"></canvas>
  </main>
  <footer>
    <p>&copy; 2025 BlueVault Finance. All rights reserved.</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://bluevaultfinance.s3.ap-south-1.amazonaws.com/pages/sip/script.js"></script>
</body>
</html>
